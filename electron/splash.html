<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Moneto</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-app-region: drag;
    }

    .logo {
      font-size: 52px;
      font-weight: 700;
      color: #89b4fa;
      letter-spacing: 3px;
    }

    .subtitle {
      font-size: 13px;
      color: #6c7086;
      margin-top: 6px;
      letter-spacing: 1px;
    }

    .spinner-wrap {
      margin-top: 44px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #313244;
      border-top-color: #89b4fa;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      margin-top: 16px;
      font-size: 12px;
      color: #6c7086;
    }
  </style>
</head>
<body>
  <div class="logo">Moneto</div>
  <div class="subtitle">Il tuo bilancio di casa</div>
  <div class="spinner-wrap">
    <div class="spinner"></div>
  </div>
  <div class="status" id="status">Avvio in corso...</div>
</body>
</html>

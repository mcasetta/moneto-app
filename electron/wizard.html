<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Moneto - Configurazione iniziale</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      -webkit-app-region: drag;
    }

    .logo {
      font-size: 36px;
      font-weight: 700;
      color: #89b4fa;
      letter-spacing: 3px;
      margin-bottom: 6px;
    }

    .welcome {
      font-size: 13px;
      color: #6c7086;
      margin-bottom: 32px;
      text-align: center;
    }

    .form {
      width: 100%;
      -webkit-app-region: no-drag;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #a6adc8;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      color: #cdd6f4;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: #89b4fa;
    }

    input::placeholder {
      color: #585b70;
    }

    .advanced-toggle {
      font-size: 12px;
      color: #6c7086;
      cursor: pointer;
      margin-bottom: 16px;
      user-select: none;
      -webkit-app-region: no-drag;
    }

    .advanced-toggle:hover { color: #a6adc8; }

    .advanced { display: none; }
    .advanced.visible { display: block; }

    button {
      width: 100%;
      padding: 11px;
      background: #89b4fa;
      border: none;
      border-radius: 6px;
      color: #1e1e2e;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-app-region: no-drag;
    }

    button:hover { background: #b4d0ff; }
    button:disabled { background: #45475a; color: #6c7086; cursor: not-allowed; }

    .error {
      font-size: 12px;
      color: #f38ba8;
      margin-top: 4px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="logo">Moneto</div>
  <div class="welcome">Benvenuto! Configura la tua installazione.</div>

  <div class="form">
    <div class="field">
      <label for="instanceName">Nome installazione</label>
      <input
        type="text"
        id="instanceName"
        placeholder="es. Casa Mia, Famiglia Bianchi"
        maxlength="50"
        autocomplete="off"
      />
      <div class="error" id="nameError">Inserisci un nome per l'installazione.</div>
    </div>

    <div class="advanced-toggle" id="advancedToggle">▸ Impostazioni avanzate</div>

    <div class="advanced" id="advancedSection">
      <div class="field">
        <label for="port">Porta backend (default: 8080)</label>
        <input
          type="number"
          id="port"
          value="8080"
          min="1024"
          max="65535"
        />
        <div class="error" id="portError">Inserisci una porta valida (1024-65535).</div>
      </div>
    </div>

    <button id="submitBtn">Inizia</button>
  </div>

  <script>
    const advancedToggle = document.getElementById('advancedToggle');
    const advancedSection = document.getElementById('advancedSection');
    advancedToggle.addEventListener('click', () => {
      const visible = advancedSection.classList.toggle('visible');
      advancedToggle.textContent = (visible ? '▾' : '▸') + ' Impostazioni avanzate';
    });

    document.getElementById('submitBtn').addEventListener('click', async () => {
      const nameInput = document.getElementById('instanceName');
      const portInput = document.getElementById('port');
      const nameError = document.getElementById('nameError');
      const portError = document.getElementById('portError');

      let valid = true;

      const name = nameInput.value.trim();
      if (!name) {
        nameError.style.display = 'block';
        valid = false;
      } else {
        nameError.style.display = 'none';
      }

      const port = parseInt(portInput.value, 10);
      if (isNaN(port) || port < 1024 || port > 65535) {
        portError.style.display = 'block';
        valid = false;
      } else {
        portError.style.display = 'none';
      }

      if (!valid) return;

      document.getElementById('submitBtn').disabled = true;
      await window.electronAPI.submitWizard({ instanceName: name, port });
    });

    // Submit on Enter
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('submitBtn').click();
    });
  </script>
</body>
</html>

appId: com.casetta.moneto
productName: Moneto

directories:
  output: dist

# Files included in the Electron app bundle
files:
  - electron/**/*
  - assets/**/*
  - package.json

# Extra resources bundled alongside the app (not in asar)
# These are accessible at process.resourcesPath at runtime
extraResources:
  - from: resources/moneto.jar
    to: moneto.jar
  - from: resources/jre
    to: jre
    filter:
      - "**/*"

win:
  target:
    - target: nsis
  icon: assets/icon.ico
  artifactName: "Moneto-Setup-${version}.exe"

nsis:
  oneClick: false
  perMachine: true                 # install to C:\Program Files, requires UAC elevation
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Moneto
  uninstallDisplayName: Moneto
  deleteAppDataOnUninstall: false  # preserve user data (DB, config, logs) on uninstall
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico

# Auto-update via GitHub Releases
publish:
  provider: github
  owner: mcasetta
  repo: moneto-app
  private: true
